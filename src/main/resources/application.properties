spring.application.name=family-league

# Datasource — set via environment variables or application-local.properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Hibernate manages the schema directly (no Flyway)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=${JWT_EXPIRY_MS:3600000}

# Prediction lock windows (configurable)
app.prediction.match-lock-hours=1
app.prediction.league-lock-hours=4

# Async executor
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=leaderboard-executor-

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.mail.admin=${ADMIN_EMAIL:admin@family-league.local}

# Cron schedules
scheduler.match-reminder.cron=${MATCH_REMINDER_CRON:0 0 * * * *}
scheduler.result-alert.cron=${RESULT_ALERT_CRON:0 * * * * *}

# SpringDoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
